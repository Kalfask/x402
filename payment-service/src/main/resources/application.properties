server.port=8083
spring.application.name=payment-service
# MySQL (same database as other services)
spring.datasource.url=jdbc:mysql://localhost:3306/x402_auth?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# JWT (same secret as auth-service and provider-service)
app.jwt.secret=${JWT_SECRET}
#Internal API KEY (GATEWAY must send this to call /verify
app.internal-api-key =${INTERNAL_API_KEY}
# Blockchain - Base Sepolia
app.blockchain.rpc-url=https://sepolia.base.org
app.blockchain.usdc-contract=0x036CbD53842c5426634e7929541eC2318f3dCF7e
# USDC on Base Sepolia has 6 decimals
# 1 USDC = 1000000 (1e6) in raw blockchain units
app.blockchain.usdc-decimals=6


management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

