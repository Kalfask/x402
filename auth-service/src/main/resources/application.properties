spring.application.name=auth-service

# Server
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/x402_auth?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Frontend URL (where to redirect after OAuth2 login)
app.frontend-url=http://localhost:5173
spring.security.oauth2.client.registration.github.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/github}

# OAuth2 - Google (optional, set up later)
#spring.security.oauth2.client.registration.google.client-id=YOUR_ID
#spring.security.oauth2.client.registration.google.client-secret=YOUR_SECRET
#spring.security.oauth2.client.registration.google.scope=openid,profile,email

# OAuth2 - GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email


management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true


