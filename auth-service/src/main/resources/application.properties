spring.application.name=auth-service

# Server
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/x402_auth?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=my-super-secret-key-that-should-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Frontend URL (where to redirect after OAuth2 login)
app.frontend-url=http://localhost:5173

