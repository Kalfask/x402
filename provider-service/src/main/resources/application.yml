server:
  port: 8082

spring:
  application:
    name: provider-service
  datasource:
    url: jdbc:mysql://localhost:3306/x402_auth?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      port: '6379'
      host: localhost

app:
  jwt.secret: ${JWT_SECRET}
  internal.key: ${INTERNAL_KEY}
  services:
    auth-url: http://AUTH-SERVICE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: 'true'
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: 'true'
