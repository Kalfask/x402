server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: auth-oauth2
              uri: http://localhost:8081
              predicates:
                - Path=/oauth2/**

            - id: auth-login-oauth2
              uri: http://localhost:8081
              predicates:
                - Path=/login/oauth2/**

            - id: provider-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/provider/**

            - id: marketplace
              uri: http://localhost:8082
              predicates:
                - Path=/api/marketplace/**

          
app:
  jwt-secret: ${JWT_SECRET}