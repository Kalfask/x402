server:
  port: 8080

spring:
  application:
    name: api-gateway

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          redis-rate-limiter:
            replenishRate: 10
            burstCapacity: 20
            requestedTokens: 1

          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 5
                    key-resolver: "#{@userIpKeyResolver}"

            - id: auth-oauth2
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/oauth2/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 5
                    key-resolver: "#{@userIpKeyResolver}"

            - id: auth-login-oauth2
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/login/oauth2/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 5
                    key-resolver: "#{@userIpKeyResolver}"

            - id: provider-service
              uri: lb://PROVIDER-SERVICE
              predicates:
                - Path=/api/provider/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 50
                    key-resolver: "#{@userIpKeyResolver}"

            - id: marketplace
              uri: lb://PROVIDER-SERVICE
              predicates:
                - Path=/api/marketplace/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 50
                    key-resolver: "#{@userIpKeyResolver}"

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/pay/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@userIpKeyResolver}"

            - id: proxy-api-calls
              uri: no://op
              predicates:
                - Path=/api/call/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@userIpKeyResolver}"

app:
  jwt-secret: ${JWT_SECRET}
  internal-api-key: ${INTERNAL_API_KEY}
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    provider-url: ${PROVIDER_SERVICE_URL:http://localhost:8082}
    payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}




management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true